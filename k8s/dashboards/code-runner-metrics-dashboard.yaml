apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-code-runner-metrics-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  code-runner-metrics.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{job=\"code-runner-service\"}[5m])) by (method, uri)", "legendFormat": "{{method}} {{uri}}", "refId": "A"}],
          "title": "HTTP request rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_sum{job=\"code-runner-service\"}[5m])) by (method, uri) / clamp_min(sum(rate(http_server_requests_seconds_count{job=\"code-runner-service\"}[5m])) by (method, uri), 1e-9)", "legendFormat": "{{method}} {{uri}}", "refId": "A"}],
          "title": "HTTP average duration",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{job=\"code-runner-service\", status=~\"5..\"}[5m])) by (status, uri)", "legendFormat": "{{status}} {{uri}}", "refId": "A"}],
          "title": "HTTP 5xx errors",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [{"expr": "process_cpu_usage{job=\"code-runner-service\"}", "legendFormat": "process", "refId": "A"}, {"expr": "system_cpu_usage{job=\"code-runner-service\"}", "legendFormat": "system", "refId": "B"}],
          "title": "CPU usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 5,
          "targets": [{"expr": "sum(jvm_memory_used_bytes{job=\"code-runner-service\"}) by (area)", "legendFormat": "{{area}} used", "refId": "A"}, {"expr": "sum(jvm_memory_max_bytes{job=\"code-runner-service\"}) by (area)", "legendFormat": "{{area}} max", "refId": "B"}],
          "title": "JVM memory",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 6,
          "targets": [{"expr": "jvm_threads_live_threads{job=\"code-runner-service\"}", "legendFormat": "live", "refId": "A"}, {"expr": "jvm_threads_daemon_threads{job=\"code-runner-service\"}", "legendFormat": "daemon", "refId": "B"}],
          "title": "JVM threads",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "id": 7,
          "targets": [{"expr": "hikaricp_connections_active{job=\"code-runner-service\"}", "legendFormat": "active", "refId": "A"}, {"expr": "hikaricp_connections_idle{job=\"code-runner-service\"}", "legendFormat": "idle", "refId": "B"}, {"expr": "hikaricp_connections_pending{job=\"code-runner-service\"}", "legendFormat": "pending", "refId": "C"}],
          "title": "Database connection pool",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "id": 8,
          "targets": [{"expr": "process_uptime_seconds{job=\"code-runner-service\"}", "legendFormat": "uptime", "refId": "A"}],
          "title": "Process uptime",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "id": 9,
          "targets": [{"expr": "pool_containers_available{job=\"code-runner-service\"}", "legendFormat": "{{language}} available", "refId": "A"}, {"expr": "pool_containers_total{job=\"code-runner-service\"}", "legendFormat": "{{language}} total", "refId": "B"}],
          "title": "Container pools",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "id": 10,
          "targets": [{"expr": "sum(rate(pool_container_borrow_time_seconds_sum{job=\"code-runner-service\"}[5m])) by (language) / clamp_min(sum(rate(pool_container_borrow_time_seconds_count{job=\"code-runner-service\"}[5m])) by (language), 1e-9)", "legendFormat": "{{language}} average", "refId": "A"}, {"expr": "pool_container_borrow_time_seconds_max{job=\"code-runner-service\"}", "legendFormat": "{{language}} max", "refId": "B"}],
          "title": "Container borrow duration",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 40},
          "id": 11,
          "targets": [{"expr": "sum(rate(pool_container_exec_time_seconds_sum{job=\"code-runner-service\"}[5m])) by (language) / clamp_min(sum(rate(pool_container_exec_time_seconds_count{job=\"code-runner-service\"}[5m])) by (language), 1e-9)", "legendFormat": "{{language}} average", "refId": "A"}, {"expr": "pool_container_exec_time_seconds_max{job=\"code-runner-service\"}", "legendFormat": "{{language}} max", "refId": "B"}],
          "title": "Container command duration",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 40},
          "id": 12,
          "targets": [{"expr": "sum(rate(pool_container_borrow_failures_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} borrow failures/s", "refId": "A"}, {"expr": "sum(rate(consumer_messages_failed_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} consumer failures/s", "refId": "B"}],
          "title": "Pool and consumer failures",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 48},
          "id": 13,
          "targets": [{"expr": "sum(rate(consumer_messages_received_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} received/s", "refId": "A"}, {"expr": "sum(rate(producer_results_published_total{job=\"code-runner-service\"}[5m]))", "legendFormat": "published/s", "refId": "B"}, {"expr": "sum(rate(producer_results_serialization_failures_total{job=\"code-runner-service\"}[5m]))", "legendFormat": "serialization failures/s", "refId": "C"}],
          "title": "RabbitMQ consumer and producer",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 48},
          "id": 14,
          "targets": [{"expr": "sum(rate(consumer_messages_processing_time_seconds_sum{job=\"code-runner-service\"}[5m])) by (language) / clamp_min(sum(rate(consumer_messages_processing_time_seconds_count{job=\"code-runner-service\"}[5m])) by (language), 1e-9)", "legendFormat": "{{language}} consumer", "refId": "A"}, {"expr": "sum(rate(executions_duration_seconds_sum{job=\"code-runner-service\"}[5m])) by (language) / clamp_min(sum(rate(executions_duration_seconds_count{job=\"code-runner-service\"}[5m])) by (language), 1e-9)", "legendFormat": "{{language}} execution", "refId": "B"}],
          "title": "Processing and execution duration",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 56},
          "id": 15,
          "targets": [{"expr": "sum(rate(executions_by_language_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} executions/s", "refId": "A"}, {"expr": "sum(rate(tests_passed_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} tests passed/s", "refId": "B"}, {"expr": "sum(rate(tests_failed_total{job=\"code-runner-service\"}[5m])) by (language)", "legendFormat": "{{language}} tests failed/s", "refId": "C"}],
          "title": "Executions and test results",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["sunboys", "code-runner", "metrics"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "SUNBOYS / Code Runner Metrics",
      "uid": "sunboys-code-runner-metrics",
      "version": 1
    }
