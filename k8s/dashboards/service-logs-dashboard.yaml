apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-service-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-logs.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "gridPos": {
            "h": 15,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "Loki"
              },
              "editorMode": "code",
              "expr": "{namespace=~\"$namespace\", app=~\"$app\"} |~ \"$search\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Service Logs",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "logs/s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "Loki"
              },
              "editorMode": "code",
              "expr": "sum by (app) (rate({namespace=~\"$namespace\", app=~\"$app\"}[$__auto]))",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Log Rate By Service",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "11.4.0",
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "Loki"
              },
              "editorMode": "code",
              "expr": "sum(count_over_time({namespace=~\"$namespace\", app=~\"$app\"} |~ \"(?i)error|exception|failed\" [$__range]))",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Errors In Selected Range",
          "type": "stat"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": [
        "sunboys",
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "app|infra|monitoring",
              "value": "app|infra|monitoring"
            },
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [
              {
                "selected": true,
                "text": "app|infra|monitoring",
                "value": "app|infra|monitoring"
              }
            ],
            "query": "app|infra|monitoring",
            "type": "textbox"
          },
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "loki",
              "uid": "Loki"
            },
            "definition": "label_values({namespace=~\"$namespace\"}, app)",
            "hide": 0,
            "includeAll": true,
            "label": "Service",
            "multi": true,
            "name": "app",
            "query": "label_values({namespace=~\"$namespace\"}, app)",
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": false,
              "text": ".*",
              "value": ".*"
            },
            "hide": 0,
            "label": "Search",
            "name": "search",
            "options": [
              {
                "selected": true,
                "text": ".*",
                "value": ".*"
              }
            ],
            "query": ".*",
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "SUNBOYS / Service Logs",
      "uid": "sunboys-service-logs",
      "version": 1,
      "weekStart": ""
    }
