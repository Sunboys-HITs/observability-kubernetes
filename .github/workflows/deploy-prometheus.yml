name: Deploy Prometheus

on:
  push:
    branches:
      - main
    paths:
      - helm/prometheus/**
      - .github/workflows/deploy-prometheus.yml
  workflow_dispatch:

env:
  NAMESPACE: monitoring

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64" || {
            echo 'KUBECONFIG_B64 GitHub Actions secret is not configured' >&2
            exit 1
          }
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Add Prometheus Helm repository
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Preflight cluster health
        run: kubectl get nodes

      - name: Deploy Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --values helm/prometheus/values.yaml \
            --wait \
            --timeout 5m

      - name: Show Prometheus resources
        if: always()
        run: kubectl -n "$NAMESPACE" get deployment,pod,service,pvc -l app.kubernetes.io/instance=prometheus -o wide
